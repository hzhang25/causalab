# @package activation_manifold
_name_: activation_manifold
_subdir: ${.method}_s${.smoothness}
_output_dir: ${experiment_root}/activation_manifold/${._subdir}

method: spline
smoothness: 0.0
spline_method: auto             # "auto" (default), "tps", or "cubic". Auto picks cubic for 1D non-cyclic, else TPS.
intrinsic_dim: null
n_grid: 21
batch_size: 32
subspace: null
layers: null                   # list[int] or null. Selects which grid cells to use from subspace. null = best_cell.
token_positions: [last_token]  # list[str] or null. Selects which positions from subspace grid. null = best_cell.
intrinsic_mode: pca  # "parameter" (canonical θ) or "pca" (data-driven from centroid PCA).
max_control_points: "all"      # int or "all"; subsamples evenly spaced centroids before TPS fit
skip_decoding_eval: true       # Default: skip the decoding reconstruction test (step 3b) so model weights aren't loaded.
                               # For richer manifold-traversal evaluation, run the path_steering analysis.
colormap: ${task.colormap}     # inherited from task config
embedding_shuffle_seed: null   # Seed for permuting embedding order (null = canonical order)

visualization:
  figure_format: pdf

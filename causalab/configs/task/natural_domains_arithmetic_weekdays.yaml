name: natural_domains_arithmetic
domain_type: weekdays
variant: weekdays
number_range: null
number_groups: null
templates: null
max_new_tokens: 1
colormap: rainbow
colormap2: null
intervention_metric: kl
reference_source: empirical
n_train: 1000
n_test: 50
enumerate_all: true
balanced: false
# "all" = counterfactual resamples every input variable (task's generator).
# A variable name (e.g. "entity") = CF differs from original only in that one
# variable. Required for locate pairwise mode. See ARCHITECTURE.md §5.
resample_variable: all
distance_function: hellinger
isometry:
  distance_function: ${task.distance_function}
  grid_range: [0, 7]
  grid_resolution: 150
  bin_positions: null

